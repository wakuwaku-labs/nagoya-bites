// 全データキャッシュ
var ALL_STORES = [];
var FILTERED   = [];
var ACTIVE_TAGS = [];

// ================================================================
// 初期化：API_URLがあればスプレッドシートから、なければローカル
// ================================================================
// CSVテキストをパース（ダブルクォート・カンマ対応）
function parseCSV(text) {
  var lines = text.trim().split('\n');
  var headers = splitCSVLine(lines[0]).map(function(h){ return h.trim().replace(/^"|"$/g,''); });
  var stores = [];
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var cols = splitCSVLine(lines[i]);
    if (!cols[0] || cols[0].replace(/^"|"$/g,'').trim() === '') continue;
    var store = {};
    headers.forEach(function(h, j){ store[h] = (cols[j] || '').replace(/^"|"$/g,'').trim(); });
    stores.push(store);
  }
  return stores;
}

function splitCSVLine(line) {
  var cols = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else { inQ = !inQ; }
    } else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
    else { cur += ch; }
  }
  cols.push(cur);
  return cols;
}

var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRof98u7WlzdwLEZ0GnY47kH4-hi9odkNZlDGVyzjrPb5FSGAwLTfzp9QRwg8tG4_ZqMEC_yetvgcfy/pub?output=csv';

function parseCSV(text) {
  var lines = text.trim().split('\n');
  var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/^"|"$/g,''); });
  var stores = [];
  for (var i = 1; i < lines.length; i++) {
    var cols = [], cur = '', inQ = false;
    for (var ci = 0; ci < lines[i].length; ci++) {
      var ch = lines[i][ci];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    if (!cols[0] || cols[0].replace(/^"|"$/g,'') === '') continue;
    var store = {};
    headers.forEach(function(h, j) { store[h] = (cols[j]||'').replace(/^"|"$/g,'').trim(); });
    stores.push(store);
  }
  return stores;
}

function init() {
  renderSkeletons();
  fetch(CSV_URL + '&t=' + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var stores = parseCSV(text);
      loadStores(stores.length ? stores : LOCAL_STORES);
    })
    .catch(function() { loadStores(LOCAL_STORES); });
}

function loadStores(stores) {
  // 公開フラグがTRUEのものだけ表示
  ALL_STORES = stores.filter(function(s){ return s['公開フラグ'] !== 'FALSE'; });
  FILTERED   = ALL_STORES.slice();
  buildPrefTabs();
  buildGenreTabs();
  buildTagFilter();
  buildCapTabs();
  renderGrid(FILTERED);
}

// ================================================================
// 都道府県タブを動的生成
// ================================================================
function buildCapTabs() {
  var container = document.getElementById('cap-tabs');
  container.innerHTML = '<span class="cap-label">Capacity</span>'
    + '<input class="cap-input" id="cap-input" type="number" min="1" max="999" placeholder="例:35">'
    + '<span class="cap-unit">名以上収容できるお店</span>'
    + '<span class="cap-hint">（空欄=すべて）</span>';
  document.getElementById('cap-input').addEventListener('input', applyFilters);
}
function buildPrefTabs() {
  var prefs = ['全国'];
  ALL_STORES.forEach(function(s){
    var p = s['都道府県'];
    if (p && prefs.indexOf(p) < 0) prefs.push(p);
  });
  var container = document.getElementById('pref-tabs');
  container.innerHTML = prefs.map(function(p, i){
    return '<div class="pt' + (i===0?' on':'') + '" data-pref="' + p + '">' + p + '</div>';
  }).join('');
  container.onclick = function(e) {
    var t = e.target;
    if (!t.classList.contains('pt')) return;
    container.querySelectorAll('.pt').forEach(function(x){ x.classList.remove('on'); });
    t.classList.add('on');
    applyFilters();
  };
}

// ================================================================
// ジャンルタブを動的生成
// ================================================================
function buildGenreTabs() {
  var genres = ['All'];
  ALL_STORES.forEach(function(s){
    if (s['ジャンル']) {
      s['ジャンル'].split('・').forEach(function(g){
        g = g.trim();
        if (g && genres.indexOf(g) < 0) genres.push(g);
      });
    }
  });
  var bar = document.querySelector('.filter-bar');
  bar.innerHTML = '<span class="fl">Genre</span>' + genres.map(function(g, i){
    return '<div class="ft' + (i===0?' on':'') + '" data-f="' + g + '">' + g + '</div>';
  }).join('');
  bar.onclick = function(e) {
    var t = e.target;
    if (!t.classList.contains('ft')) return;
    bar.querySelectorAll('.ft').forEach(function(x){ x.classList.remove('on'); });
    t.classList.add('on');
    applyFilters();
  };
}

// ================================================================
// タグフィルターを動的生成
// ================================================================
function buildTagFilter() {
  var cats = [
    {label:'シーン',   tags:['デート','女子会','接待','誕生日・記念日','歓送迎会','忘年会・新年会','家族・子連れ']},
    {label:'席・空間', tags:['個室','半個室','カウンター','テラス席','座敷','貸切可','隠れ家']},
    {label:'予算',     tags:['〜1000円','1000〜2000円','2000〜3000円','3000〜5000円','5000円以上']}
  ];
  var html = cats.map(function(c){
    return '<div class="tag-group"><span class="tag-label">' + c.label + '</span>' +
      c.tags.map(function(t){ return '<div class="tg" data-tag="' + t + '">' + t + '</div>'; }).join('') +
    '</div>';
  }).join('') + '<div class="tag-reset-wrap"><button class="tag-reset" onclick="resetTags()">タグをリセット</button></div>';
  var el = document.getElementById('tag-filter');
  el.innerHTML = html;
  el.addEventListener('click', function(e){
    var t = e.target;
    if (!t.classList.contains('tg')) return;
    t.classList.toggle('on');
    var tag = t.dataset.tag;
    var idx = ACTIVE_TAGS.indexOf(tag);
    if (idx >= 0) ACTIVE_TAGS.splice(idx, 1); else ACTIVE_TAGS.push(tag);
    applyFilters();
  });
}

function resetTags() {
  ACTIVE_TAGS = [];
  document.querySelectorAll('.tg.on').forEach(function(el){ el.classList.remove('on'); });
  applyFilters();
}

// ================================================================
// フィルター適用（都道府県 × ジャンル × タグ × 検索ワード）
// ================================================================
function applyFilters() {
  if (!ALL_STORES || ALL_STORES.length === 0) return;
  var prefEl  = document.querySelector('.pt.on');
  var genreEl = document.querySelector('.ft.on');
  var capInputEl = document.getElementById('cap-input');
  var pref    = prefEl  ? prefEl.dataset.pref : '全国';
  var genre   = genreEl ? genreEl.dataset.f   : 'All';
  var capNum  = capInputEl ? parseInt(capInputEl.value, 10) : NaN;  var siEl    = document.getElementById('si');
  var q       = siEl ? siEl.value.trim().toLowerCase() : '';
  FILTERED = ALL_STORES.filter(function(s){
    var okPref  = (pref === '全国' || pref === 'all') || (s['都道府県'] || '') === pref;
    var okGenre = genre === 'All' || (s['ジャンル'] || '').indexOf(genre) !== -1;
      var okCap   = (isNaN(capNum) || capNum <= 0) ? true :
      (s['タグ'] || '').split(/[,、，\/]/).some(function(t) {
        t = t.trim();
        var m1 = t.match(/^(\d+)[〜～](\d+)名$/);
        if (m1) return parseInt(m1[2], 10) >= capNum;
        var m2 = t.match(/^(\d+)名以上$/);
        if (m2) return true;
        return false;
      }); }).indexOf(cap) !== -1;
    var okQ     = !q
      || (s['店名']||'').toLowerCase().indexOf(q) !== -1
      || (s['ジャンル']||'').toLowerCase().indexOf(q) !== -1
      || (s['エリア']||'').toLowerCase().indexOf(q) !== -1
      || (s['タグ']||'').toLowerCase().indexOf(q) !== -1;
    var storeTags = (s['タグ']||'').split(',').map(function(t){ return t.trim(); });
    var okTags  = ACTIVE_TAGS.length === 0 || ACTIVE_TAGS.every(function(tag){ return storeTags.indexOf(tag) !== -1; });
    return okPref && okGenre && okCap && okQ && okTags;
  });
  renderGrid(FILTERED);
}

function doSearch(){ applyFilters(); }
document.getElementById('si').addEventListener('keydown', function(e){ if(e.key==='Enter') applyFilters(); });

// ================================================================

// ================================================================
function gmap(name, area) {
  return 'https://maps.google.com/search?q=' + encodeURIComponent(name + ' ' + (area||''));
}

function renderGrid(data) {

    document.getElementById('grid').innerHTML = '<div style="padding:3rem;color:var(--dim);font-family:monospace;font-size:.75rem;letter-spacing:.1em;">No results found.</div>';
    return;
  }
  document.getElementById('grid').innerHTML = data.map(function(r, i) {
    var idx     = ALL_STORES.indexOf(r);
    var photo   = r['写真URL'] || 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800&q=80';
    var hpUrl   = 'https://www.hotpepper.jp/str' + (r['ホットペッパーID']||'') + '/';
    var genre   = (r['ジャンル']||'').split('・')[0];
    var pref    = r['都道府県'] || '';
    var area    = r['エリア']   || '';
    var mediaLinks =
      '<a class="ml hp" href="' + hpUrl + '" target="_blank" onclick="event.stopPropagation()">🌶 Hotpepper</a>' +
      '<a class="ml tb" href="' + (r['食べログURL'] || 'https://tabelog.com/aichi/A2301/A230101/rstLst/?vs=1&sa=%E5%90%8D%E5%8F%A4%E5%B1%8B%E9%A7%85&sw=' + encodeURIComponent(r['店名'])) + '" target="_blank" onclick="event.stopPropagation()">🍽 食べログ</a>' +
      '<a class="ml ig" href="' + (r['Instagram'] || 'https://www.instagram.com/explore/search/keyword/?q=' + encodeURIComponent(r['店名'] + ' 名古屋')) + '" target="_blank" onclick="event.stopPropagation()">📸 Instagram</a>' +
      '<a class="ml tk" href="' + (r['TikTok検索']||'#') + '" target="_blank" onclick="event.stopPropagation()">🎵 TikTok</a>' +
      '<a class="ml xx" href="' + (r['X検索']||'#') + '" target="_blank" onclick="event.stopPropagation()">𝕏 X</a>' +
      '<a class="ml gm" href="' + gmap(r['店名'], area) + '" target="_blank" onclick="event.stopPropagation()">📍 Google</a>';

    return '<div class="card" onclick="openM(' + idx + ')">' +
      '<div class="ci"><img src="' + photo + '" alt="' + r['店名'] + '" loading="lazy" onerror="this.style.opacity=\'.1\'"></div>' +
      '<span class="badge">' + genre + '</span>' +
      (pref ? '<span class="pref-badge">' + pref + '</span>' : '') +
      '<div class="cb">' +
        '<div class="cn">' + r['店名'] + '</div>' +
        '<div class="ce">' + (r['英語名']||'') + '</div>' +
        '<div class="cmeta"><span data-l="Area">' + area + '</span><span data-l="Price">' + (r['価格帯']||'') + '</span></div>' +
        '<div class="cbook"><a href="' + hpUrl + '" target="_blank" onclick="event.stopPropagation()">🌶 ホットペッパーで予約</a></div>' +
      '</div>' +
      '<div class="mrow">' + mediaLinks + '</div>' +
    '</div>';
  }).join('');
}

  }).join('');

function closeM() {

}
document.getElementById('ov').addEventListener('click', function(e){ if(e.target===this) closeM(); });
