<html lang="ja">
<head>
<meta charset="UTF-8">

<title>NAGOYA BITES</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0d;--bg2:#181816;--surface:#222220;--border:rgba(255,255,255,0.12);--border-h:rgba(255,255,255,0.28);--text:#f0ece4;--muted:rgba(240,236,228,0.72);--dim:rgba(240,236,228,0.48);--gold:#d4aa72;--gold2:#e8c98a;--white:#faf7f2;}
*{margin:0;padding:0;box-sizing:border-box;}
::selection{background:var(--gold);color:var(--bg);}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
header{position:fixed;top:0;left:0;right:0;z-index:200;padding:0 3rem;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,8,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.2rem;letter-spacing:.35em;color:var(--white);text-transform:uppercase;}
.logo em{font-style:italic;color:var(--gold);}
nav{display:flex;gap:2rem;align-items:center;}
nav a{font-size:.68rem;letter-spacing:.16em;color:var(--muted);text-decoration:none;text-transform:uppercase;transition:color .2s;}
nav a:hover{color:var(--text);}

/* ── HERO ── */
.hero{padding:150px 3rem 90px;position:relative;overflow:hidden;min-height:88vh;display:flex;flex-direction:column;justify-content:flex-end;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 65% 55% at 72% 38%,rgba(201,169,110,.07) 0%,transparent 65%);}
.eyebrow{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;margin-bottom:1.8rem;opacity:0;animation:up .8s .2s forwards;}
.hero h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(3.2rem,7.5vw,6.5rem);line-height:1.0;color:var(--white);opacity:0;animation:up .9s .35s forwards;}
.hero h1 em{font-style:italic;color:var(--gold);}
.hero h1 .fade{opacity:.4;}
.hero-sub{margin-top:1.8rem;font-size:.76rem;letter-spacing:.07em;color:var(--muted);line-height:2.1;max-width:360px;opacity:0;animation:up .9s .5s forwards;}
.search-wrap{margin-top:2.2rem;display:flex;gap:.6rem;max-width:460px;opacity:0;animation:up .9s .65s forwards;}
.search-wrap input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.8rem 1.1rem;font-size:.8rem;border-radius:2px;outline:none;font-family:inherit;transition:border-color .2s;}
.search-wrap input::placeholder{color:var(--dim);}
.search-wrap input:focus{border-color:var(--gold);}
.search-wrap button{background:var(--gold);border:none;color:var(--bg);padding:.8rem 1.4rem;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;border-radius:2px;cursor:pointer;font-weight:500;transition:background .2s;}
.search-wrap button:hover{background:var(--gold2);}
@keyframes up{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* ── FILTER BAR ── */
.filter-bar{padding:1rem 3rem;display:flex;gap:.45rem;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:64px;z-index:100;}
.fl{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.2em;color:var(--dim);margin-right:.4rem;text-transform:uppercase;}
.ft{font-size:.63rem;letter-spacing:.09em;color:var(--muted);border:1px solid var(--border);padding:.28rem .8rem;border-radius:1px;cursor:pointer;transition:all .2s;user-select:none;}
.ft:hover{color:var(--text);border-color:var(--border-h);}
.ft.on{color:var(--gold);border-color:var(--gold);background:rgba(201,169,110,.07);}

/* ── SECTION HEAD ── */
.sec-head{padding:3rem 3rem 1.8rem;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--border);}
.sec-head h2{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.9rem;letter-spacing:.04em;color:var(--white);}
.sec-head h2 em{font-style:italic;color:var(--gold);}
.cnt{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.18em;color:var(--dim);}

/* ── HP CREDIT ── */
.hpc{padding:.65rem 3rem;display:flex;align-items:center;gap:.6rem;border-bottom:1px solid var(--border);background:var(--bg2);}
.hpc span,.hpc a{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.08em;color:var(--dim);}
.hpc a{color:var(--gold);text-decoration:none;}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1px;background:var(--border);}

/* ── SKELETON ── */
.skel{background:var(--bg);animation:pulse 1.6s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.skel-img{height:210px;background:var(--surface);}
.skel-body{padding:1.2rem 1.4rem;}
.skel-line{height:.75rem;background:var(--surface);border-radius:2px;margin-bottom:.75rem;}
.skel-line.w60{width:60%;}
.skel-line.w40{width:40%;}

/* ── CARD ── */
.card{background:var(--bg);cursor:pointer;position:relative;transition:background .25s;}
.card:hover{background:var(--surface);}
.ci{height:210px;overflow:hidden;position:relative;background:var(--surface);}
.ci img{width:100%;height:100%;object-fit:cover;filter:brightness(.7) saturate(.6);transition:filter .5s,transform .65s;display:block;}
.card:hover .ci img{filter:brightness(.9) saturate(.8);transform:scale(1.05);}
.ci::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,8,.9) 0%,transparent 55%);}
.badge{position:absolute;top:.9rem;left:.9rem;font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.14em;color:var(--gold);border:1px solid rgba(201,169,110,.4);padding:.2rem .55rem;text-transform:uppercase;background:rgba(10,10,8,.7);backdrop-filter:blur(6px);z-index:2;}
.pref-badge{position:absolute;top:.9rem;right:.9rem;font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.1em;color:var(--dim);background:rgba(10,10,8,.7);border:1px solid var(--border);padding:.2rem .5rem;z-index:2;}
.cb{padding:1.2rem 1.4rem 0;}
.cn{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:1.25rem;letter-spacing:.02em;color:var(--white);margin-bottom:.15rem;line-height:1.2;}
.ce{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.13em;color:var(--dim);text-transform:uppercase;margin-bottom:.8rem;}
.cmeta{display:flex;gap:1rem;font-size:.66rem;color:var(--muted);margin-bottom:.7rem;}
.cmeta span::before{content:attr(data-l)' ';color:var(--dim);font-size:.56rem;text-transform:uppercase;}
.cbook{padding-bottom:.85rem;border-bottom:1px solid var(--border);}
.cbook a{font-size:.65rem;color:var(--gold);text-decoration:none;border:1px solid rgba(201,169,110,.38);padding:.22rem .65rem;border-radius:1px;transition:background .2s;}
.cbook a:hover{background:rgba(201,169,110,.12);}
.mrow{padding:.75rem 1.4rem;display:flex;flex-wrap:wrap;gap:.35rem;}
.ml{display:inline-flex;align-items:center;gap:.28rem;padding:.25rem .65rem;font-size:.58rem;letter-spacing:.09em;text-decoration:none;color:var(--muted);border:1px solid var(--border);border-radius:1px;transition:all .2s;}
.ml:hover{color:var(--text);border-color:var(--border-h);}
.ig:hover{color:#e1306c;border-color:rgba(225,48,108,.4);}
.hp:hover{color:#e6002d;border-color:rgba(230,0,45,.4);}
.tb:hover{color:#c0392b;border-color:rgba(192,57,43,.4);}
.tk:hover{color:#fff;border-color:rgba(255,255,255,.35);background:#010101;}
.xx:hover{color:#fff;border-color:rgba(255,255,255,.3);background:#111;}
.gm:hover{color:#4285F4;border-color:rgba(66,133,244,.4);}

/* ── MODAL ── */
.ov{display:none;position:fixed;inset:0;z-index:500;background:rgba(5,5,4,.9);backdrop-filter:blur(16px);align-items:center;justify-content:center;padding:1.5rem;}
.ov.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border-h);max-width:680px;width:100%;max-height:88vh;overflow-y:auto;animation:min .3s ease;}
@keyframes min{from{opacity:0;transform:translateY(22px) scale(.98);}to{opacity:1;transform:none;}}
.mhi{height:250px;position:relative;overflow:hidden;}
.mhi img{width:100%;height:100%;object-fit:cover;filter:brightness(.65) saturate(.55);}
.mhi::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,8,1) 0%,rgba(10,10,8,.1) 65%,transparent);}
.mit{position:absolute;bottom:1.4rem;left:1.8rem;z-index:2;}
.mig{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:.35rem;}
.min2{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--white);line-height:1.1;}
.mcl{position:absolute;top:.9rem;right:.9rem;background:rgba(10,10,8,.75);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;border-radius:1px;z-index:3;transition:all .2s;}
.mcl:hover{color:var(--text);border-color:var(--border-h);}
.mbody{padding:1.6rem 1.8rem 1.4rem;}
.minfo{display:grid;grid-template-columns:repeat(4,1fr);gap:1.2rem;padding-bottom:1.4rem;border-bottom:1px solid var(--border);margin-bottom:1.4rem;}
.mic label{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;display:block;margin-bottom:.35rem;}
.mic span{font-size:.78rem;color:var(--text);line-height:1.5;}
.mml{font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:.9rem;}
.mmg{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;}
.mb{display:flex;flex-direction:column;align-items:center;gap:.4rem;padding:.9rem .4rem;border:1px solid var(--border);text-decoration:none;transition:all .2s;border-radius:1px;}
.mb:hover{border-color:var(--border-h);background:var(--surface);}
.mbi{font-size:1.25rem;line-height:1;}
.mbl{font-size:.58rem;letter-spacing:.09em;color:var(--muted);text-transform:uppercase;}
.mb:hover .mbl{color:var(--text);}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:2.2rem 3rem;display:flex;justify-content:space-between;align-items:center;}
.fl2{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:.95rem;letter-spacing:.28em;color:var(--dim);text-transform:uppercase;}
.fc{font-family:'DM Mono',monospace;font-size:.54rem;letter-spacing:.1em;color:var(--dim);}

/* ── 都道府県タブ ── */
.pref-tabs{padding:.75rem 3rem;display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:var(--bg);overflow-x:auto;}
.pt{font-size:.6rem;letter-spacing:.08em;color:var(--dim);border:1px solid var(--border);padding:.22rem .65rem;border-radius:1px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.pt:hover{color:var(--muted);border-color:var(--border-h);}
.pt.on{color:var(--gold);border-color:var(--gold);background:rgba(201,169,110,.07);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px;}
</style>

var FILTERED   = [];

// ================================================================
// 初期化：API_URLがあればスプレッドシートから、なければローカル
// ================================================================
// CSVテキストをパース（ダブルクォート・カンマ対応）
function parseCSV(text) {
  var lines = text.trim().split('\n');
  var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/^"|"$/g,''); });
  var stores = [];
  for (var i = 1; i < lines.length; i++) {
    var cols = lines[i].split(',');
    if (!cols[0] || cols[0].trim() === '') continue;
    var store = {};
    headers.forEach(function(h, j){ store[h] = (cols[j] || '').trim().replace(/^"|"$/g,''); });
    stores.push(store);
  }
  return stores;
}

var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRof98u7WlzdwLEZ0GnY47kH4-hi9odkNZlDGVyzjrPb5FSGAwLTfzp9QRwg8tG4_ZqMEC_yetvgcfy/pub?output=csv';

function parseCSV(text) {
  var lines = text.trim().split('\n');
  var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/^"|"$/g,''); });
  var stores = [];
  for (var i = 1; i < lines.length; i++) {
    var cols = [], cur = '', inQ = false;
    for (var ci = 0; ci < lines[i].length; ci++) {
      var ch = lines[i][ci];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    if (!cols[0] || cols[0].replace(/^"|"$/g,'') === '') continue;
    var store = {};
    headers.forEach(function(h, j) { store[h] = (cols[j]||'').replace(/^"|"$/g,'').trim(); });
    stores.push(store);
  }
  return stores;
}

function init() {
  renderSkeletons();
  fetch(CSV_URL + '&t=' + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var stores = parseCSV(text);
      loadStores(stores.length ? stores : LOCAL_STORES);
    })
    .catch(function() { loadStores(LOCAL_STORES); });
}

function loadStores(stores) {
  // 公開フラグがTRUEのものだけ表示
  ALL_STORES = stores.filter(function(s){ return s['公開フラグ'] !== 'FALSE'; });
  FILTERED   = ALL_STORES.slice();
  buildPrefTabs();
  buildGenreTabs();
  renderGrid(FILTERED);
}

// ================================================================
// 都道府県タブを動的生成
// ================================================================
function buildPrefTabs() {
  var prefs = ['全国'];
  ALL_STORES.forEach(function(s){ if(s['都道府県'] && prefs.indexOf(s['都道府県'])<0) prefs.push(s['都道府県']); });
  var container = document.getElementById('pref-tabs');
  container.innerHTML = prefs.map(function(p){
    return '<div class="pt' + (p==='全国'?' on':'') + '" data-pref="' + p + '">' + p + '</div>';
  }).join('');
  container.querySelectorAll('.pt').forEach(function(t){
    t.addEventListener('click', function(){
      container.querySelectorAll('.pt').forEach(function(x){ x.classList.remove('on'); });
      this.classList.add('on');
      applyFilters();
    });
  });
}

// ================================================================
// ジャンルタブを動的生成
// ================================================================
function buildGenreTabs() {
  var genres = ['All'];
  ALL_STORES.forEach(function(s){
    if(s['ジャンル']) s['ジャンル'].split('・').forEach(function(g){
      if(genres.indexOf(g)<0) genres.push(g);
    });
  });
  var bar = document.querySelector('.filter-bar');
  bar.innerHTML = '<span class="fl">Genre</span>' + genres.map(function(g){
    return '<div class="ft' + (g==='All'?' on':'') + '" data-f="' + g + '">' + g + '</div>';
  }).join('');
  bar.querySelectorAll('.ft').forEach(function(t){
    t.addEventListener('click', function(){
      bar.querySelectorAll('.ft').forEach(function(x){ x.classList.remove('on'); });
      this.classList.add('on');
      applyFilters();
    });
  });
}

// ================================================================
// フィルター適用（都道府県 × ジャンル × 検索ワード）
// ================================================================
function applyFilters() {
  var prefEl  = document.querySelector('.pt.on');
  var genreEl = document.querySelector('.ft.on');
  var pref    = prefEl  ? (prefEl.dataset.pref  || 'all') : 'all';
  var genre   = genreEl ? (genreEl.dataset.f    || 'all') : 'all';
  var q       = (document.getElementById('si').value || '').trim().toLowerCase();

  var source = (ALL_STORES && ALL_STORES.length > 0) ? ALL_STORES : LOCAL_STORES;

  FILTERED = source.filter(function(s) {
    if (!s) return false;
    var keys = Object.keys(s);
    var nameKey  = keys.find(function(k){ return k.indexOf('店名') !== -1 && k.indexOf('英') === -1; }) || '店名';
    var prefKey  = keys.find(function(k){ return k.indexOf('都') !== -1; }) || '都道府県';
    var genreKey = keys.find(function(k){ return k.indexOf('ジャン') !== -1; }) || 'ジャンル';
    var areaKey  = keys.find(function(k){ return k.indexOf('エリア') !== -1; }) || 'エリア';
    var sName  = (s[nameKey]  || '');
    var sPref  = (s[prefKey]  || '');
    var sGenre = (s[genreKey] || '');
    var sArea  = (s[areaKey]  || '');
    var okPref  = pref  === 'all' || pref  === '全国' || sPref  === pref;
    var okGenre = genre === 'all' || sGenre.indexOf(genre) !== -1;
    var okQ     = !q || sName.toLowerCase().indexOf(q) !== -1 || sGenre.toLowerCase().indexOf(q) !== -1 || sArea.toLowerCase().indexOf(q) !== -1;
    return okPref && okGenre && okQ;
  });

  document.getElementById('cnt').textContent = String(FILTERED.length).padStart(2,'0') + ' Restaurants';
  renderGrid(FILTERED);
}

function doSearch(){ applyFilters(); }
document.getElementById('si').addEventListener('keydown', function(e){ if(e.key==='Enter') applyFilters(); });

// ================================================================
// スケルトン表示
// ================================================================
function renderSkeletons() {
  document.getElementById('grid').innerHTML = Array(8).fill(0).map(function(){
    return '<div class="skel"><div class="skel-img"></div><div class="skel-body"><div class="skel-line"></div><div class="skel-line w60"></div><div class="skel-line w40"></div></div></div>';
  }).join('');
}

// ================================================================
// グリッド描画
// ================================================================
function gmap(name, area) {
  return 'https://maps.google.com/search?q=' + encodeURIComponent(name + ' ' + (area||''));
}

function renderGrid(data) {
  document.getElementById('cnt').textContent = String(data.length).padStart(2,'0') + ' Restaurants';
  if (!data.length) {
    document.getElementById('grid').innerHTML = '<div style="padding:3rem;color:var(--dim);font-family:monospace;font-size:.75rem;letter-spacing:.1em;">No results found.</div>';
    return;
  }
  document.getElementById('grid').innerHTML = data.map(function(r, i) {
    var idx     = ALL_STORES.indexOf(r);
    var photo   = r['写真URL'] || 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800&q=80';
    var hpUrl   = 'https://www.hotpepper.jp/str' + (r['ホットペッパーID']||'') + '/';
    var genre   = (r['ジャンル']||'').split('・')[0];
    var pref    = r['都道府県'] || '';
    var area    = r['エリア']   || '';
    var mediaLinks =
      '<a class="ml hp" href="' + hpUrl + '" target="_blank" onclick="event.stopPropagation()">🌶 Hotpepper</a>' +
      '<a class="ml tb" href="' + (r['食べログURL']||'#') + '" target="_blank" onclick="event.stopPropagation()">🍽 食べログ</a>' +
      '<a class="ml ig" href="' + (r['Instagram']||'#') + '" target="_blank" onclick="event.stopPropagation()">📸 Instagram</a>' +
      '<a class="ml tk" href="' + (r['TikTok検索']||'#') + '" target="_blank" onclick="event.stopPropagation()">🎵 TikTok</a>' +
      '<a class="ml xx" href="' + (r['X検索']||'#') + '" target="_blank" onclick="event.stopPropagation()">𝕏 X</a>' +
      '<a class="ml gm" href="' + gmap(r['店名'], area) + '" target="_blank" onclick="event.stopPropagation()">📍 Google</a>';

    return '<div class="card" onclick="openM(' + idx + ')">' +
      '<div class="ci"><img src="' + photo + '" alt="' + r['店名'] + '" loading="lazy" onerror="this.style.opacity=\'.1\'"></div>' +
      '<span class="badge">' + genre + '</span>' +
      (pref ? '<span class="pref-badge">' + pref + '</span>' : '') +
      '<div class="cb">' +
        '<div class="cn">' + r['店名'] + '</div>' +
        '<div class="ce">' + (r['英語名']||'') + '</div>' +
        '<div class="cmeta"><span data-l="Area">' + area + '</span><span data-l="Price">' + (r['価格帯']||'') + '</span></div>' +
        '<div class="cbook"><a href="' + hpUrl + '" target="_blank" onclick="event.stopPropagation()">🌶 ホットペッパーで予約</a></div>' +
      '</div>' +
      '<div class="mrow">' + mediaLinks + '</div>' +
    '</div>';
  }).join('');
}

// ================================================================
// モーダル
// ================================================================
function openM(i) {
  var r = ALL_STORES[i];
  var photo  = r['写真URL'] || 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800&q=80';
  var hpUrl  = 'https://www.hotpepper.jp/str' + (r['ホットペッパーID']||'') + '/';
  document.getElementById('mi').src = photo;
  document.getElementById('mg').textContent = r['ジャンル'] || '';
  document.getElementById('mn').textContent = r['店名'] || '';
  document.getElementById('ma').textContent  = (r['都道府県']||'') + ' ' + (r['エリア']||'');
  document.getElementById('mp').textContent  = r['価格帯'] || '';
  document.getElementById('mh').textContent  = r['営業時間'] || '';
  document.getElementById('mac2').textContent = r['アクセス'] || '';
  var items = [
    {url:hpUrl,              icon:'🌶',label:'Hotpepper'},
    {url:r['食べログURL'],   icon:'🍽',label:'食べログ'},
    {url:r['Instagram'],     icon:'📸',label:'Instagram'},
    {url:r['TikTok検索'],    icon:'🎵',label:'TikTok'},
    {url:r['X検索'],         icon:'𝕏',label:'X'},
    {url:gmap(r['店名'],r['エリア']), icon:'📍',label:'Google'}
  ];
  document.getElementById('mmg').innerHTML = items.map(function(m){
    return '<a href="' + (m.url||'#') + '" target="_blank" class="mb"><span class="mbi">' + m.icon + '</span><span class="mbl">' + m.label + '</span></a>';
  }).join('');
  document.getElementById('ov').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeM() {
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('ov').addEventListener('click', function(e){ if(e.target===this) closeM(); });

// ================================================================
// 起動
// ================================================================
init();
</script>
</body>
</html>
