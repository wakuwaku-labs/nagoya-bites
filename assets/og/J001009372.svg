    <text x="0" y="0" font-size="20" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" fill="rgba(28,28,26,0.5)">業界人運営 ・ 広告ゼロ ・ nagoya-bites.com</text>
  </g>
