<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" width="600" height="260" role="img" aria-label="秋の土曜日、名古屋でどこに行くか——栄・錦・覚王山の選択肢">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a1a1a"/>
      <stop offset="100%" stop-color="#80383a"/>
    </linearGradient>
    <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#3a1a1a"/>
      <circle cx="0.5" cy="0.5" r="0.4" fill="#fde0a0" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="600" height="260" fill="url(#bg)"/>
  <rect width="600" height="260" fill="url(#grain)" opacity=".5"/>
  
        <g opacity=".55" fill="none" stroke="#fde0a0" stroke-width="3">
          <polygon points="510,135 540,250 480,250" />
          <line x1="492" y1="200" x2="528" y2="200"/>
          <line x1="486" y1="225" x2="534" y2="225"/>
        </g>
  <rect x="36" y="36" width="3" height="145" fill="#fde0a0" opacity=".9"/>
  <text x="46" y="108" fill="#fff" font-family="'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif" font-size="32" font-weight="700" letter-spacing="0.02em">秋の土曜日、名古屋でどこに行くか——栄</text><text x="46" y="146" fill="#fff" font-family="'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif" font-size="32" font-weight="700" letter-spacing="0.02em">錦・覚王山の選択肢</text>
  <text x="46" y="60" fill="#fde0a0" opacity=".75" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="0.3em">NAGOYA BITES</text>
</svg>
