      <stop offset="0%" stop-color="#3a4a1a"/>
      <stop offset="100%" stop-color="#7a9a3a"/>
    </linearGradient>
    <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#3a4a1a"/>
      <circle cx="0.5" cy="0.5" r="0.4" fill="#fde8a8" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="600" height="260" fill="url(#bg)"/>
  <rect width="600" height="260" fill="url(#grain)" opacity=".5"/>
  
        <g opacity=".5" fill="#fde8a8">
          <rect x="420" y="180" width="160" height="60" rx="4" fill="none" stroke="#fde8a8" stroke-width="2"/>
          <circle cx="460" cy="210" r="16"/>
          <circle cx="510" cy="210" r="12"/>
          <circle cx="550" cy="210" r="10"/>
        </g>
