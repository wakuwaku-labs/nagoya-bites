<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" role="img" aria-label="梅雨〜初夏の魚は味が落ちるのか——名古屋の魚料理店・仕入れ視点の旬と鮮度の仕分け図">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08222a"/>
      <stop offset="100%" stop-color="#10495a"/>
    </linearGradient>
    <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#08222a"/>
      <circle cx="0.5" cy="0.5" r="0.4" fill="#7fd0d6" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="600" height="360" fill="url(#bg)"/>
  <rect width="600" height="360" fill="url(#grain)" opacity=".5"/>

  <!-- watermark -->
  <g opacity=".35" fill="none" stroke="#7fd0d6" stroke-width="2">
    <rect x="470" y="292" width="100" height="52"/>
    <line x1="470" y1="310" x2="570" y2="310"/>
  </g>
  <text x="520" y="328" text-anchor="middle" fill="#7fd0d6" opacity=".6"
        font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="26" font-weight="700">NB</text>

  <!-- title -->
  <rect x="36" y="30" width="3" height="64" fill="#7fd0d6" opacity=".9"/>
  <text x="48" y="58" fill="#fff" font-family="'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif" font-size="27" font-weight="700">梅雨の魚、味は落ちるのか</text>
  <text x="48" y="86" fill="#bfe6ea" font-family="'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif" font-size="15">名古屋の魚料理店・仕入れ視点で読む 初夏〜梅雨の旬</text>

  <!-- timeline -->
  <text x="48" y="128" fill="#7fd0d6" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="13" letter-spacing="2">旬カレンダー</text>
  <line x1="50" y1="150" x2="552" y2="150" stroke="#7fd0d6" stroke-width="1.5" opacity=".6"/>
  <g font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">
    <circle cx="120" cy="150" r="4" fill="#7fd0d6"/>
    <text x="120" y="142" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">5月</text>
    <text x="120" y="172" text-anchor="middle" fill="#bfe6ea" font-size="12">アジ・イサキ</text>
    <circle cx="300" cy="150" r="5" fill="#ffd47f"/>
    <text x="300" y="142" text-anchor="middle" fill="#ffd47f" font-size="15" font-weight="700">6月 入梅</text>
    <text x="300" y="172" text-anchor="middle" fill="#ffe9bf" font-size="12">鱧・入梅いわし</text>
    <circle cx="480" cy="150" r="4" fill="#7fd0d6"/>
    <text x="480" y="142" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">7月</text>
    <text x="480" y="172" text-anchor="middle" fill="#bfe6ea" font-size="12">穴子・鱧</text>
  </g>

  <!-- two columns -->
  <g font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">
    <!-- up -->
    <rect x="40" y="200" width="258" height="118" rx="6" fill="#0d3340" stroke="#7fd0d6" stroke-width="1.2" opacity=".95"/>
    <text x="56" y="226" fill="#7fd0d6" font-size="15" font-weight="700">▲ むしろ旬を迎える</text>
    <text x="56" y="252" fill="#eaf6f7" font-size="13">鱧 — 「梅雨の水を飲んで旨くなる」</text>
    <text x="56" y="272" fill="#9fc6cc" font-size="11.5">雨で河川の栄養→プランクトン→餌が増える</text>
    <text x="56" y="296" fill="#eaf6f7" font-size="13">入梅いわし — 産卵前で一年の脂のり最高</text>
  </g>
  <g font-family="'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">
    <!-- caution -->
    <rect x="304" y="200" width="256" height="118" rx="6" fill="#2a1414" stroke="#e0866b" stroke-width="1.2" opacity=".95"/>
    <text x="320" y="226" fill="#e0866b" font-size="15" font-weight="700">▼ 管理が難しくなる</text>
    <text x="320" y="252" fill="#f6e7e3" font-size="13">高温多湿で鮮度劣化が早まる</text>
    <text x="320" y="272" fill="#cda79c" font-size="11.5">市場依存の店ほど振れ幅が出やすい</text>
    <text x="320" y="296" fill="#f6e7e3" font-size="13">水温上昇で身質が変わる魚もある</text>
  </g>

  <text x="48" y="344" fill="#7fd0d6" opacity=".75" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-size="12">結論：一律に落ちるのではなく「魚種」と「店の仕入れ」で決まる</text>
</svg>
