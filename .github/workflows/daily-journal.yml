name: NAGOYA BITES — 日次ジャーナル自動生成

on:
  # 毎日の schedule は停止中。
  # この生成は claude CLI を要し ANTHROPIC_API_KEY（有料 API）が必須だが未設定のため、
  # cron で回すと毎朝失敗する。コストゼロ運用としてジャーナル生成は
  # ローカル launchd（scripts/run_journal_local.sh / サブスク認証）を主経路にする。
  # 将来 ANTHROPIC_API_KEY を設定したら下記 schedule のコメントを外せば即復活する。
  # schedule:
  #   - cron: '0 22 * * *'   # 毎日 22:00 UTC = 翌朝 7:00 JST
  workflow_dispatch: # 手動実行（テスト・リカバリ用 / API キー設定時のみ成功）

# 既定の GITHUB_TOKEN は contents:read のため push が 403 になる。
# 自動コミット & プッシュのために write を明示する（daily-trending5.yml と同様）。
permissions:
  contents: write

jobs:
  daily-journal:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 本日記事の存在確認（重複生成防止）
        id: check
        run: |
          TODAY_JST=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          # journal_published.json に本日付エントリがあるかで判定する。
          # 旧ロジック（journal/${TODAY_JST}-*.html のファイル存在チェック）は
          # 事前生成された未登録オーファンファイルに阻害される問題があったため
          # 「published.json に登録済みかどうか」を信頼の源とする。
          PUBLISHED=$(node -e "
            const p = require('./data/journal_published.json');
            const today = '${TODAY_JST}';
            const hit = (p.entries || []).some(e => e.date === today);
            process.stdout.write(hit ? '1' : '0');
          ")
          echo "today_jst=${TODAY_JST}" >> $GITHUB_OUTPUT
          echo "exists=${PUBLISHED}" >> $GITHUB_OUTPUT
          if [ "$PUBLISHED" = "1" ]; then
            echo "本日($TODAY_JST)の記事は published.json に登録済みです。スキップします。"
          else
            echo "本日($TODAY_JST)の記事を生成します。"
            # 古いオーファンファイル（同日付の未公開HTML）があれば削除
            ORPHANS=$(ls journal/${TODAY_JST}-*.html 2>/dev/null || true)
            if [ -n "$ORPHANS" ]; then
              echo "⚠️ 未公開オーファンを検出 — 削除します:"
              echo "$ORPHANS"
              rm -f journal/${TODAY_JST}-*.html
            fi
          fi

      - name: Claude Code インストール
        if: steps.check.outputs.exists == '0'
        run: npm install -g @anthropic-ai/claude-code

      - name: 依存パッケージインストール
        if: steps.check.outputs.exists == '0'
        run: npm install

      - name: 日次ジャーナル生成（/journal-today 相当）
        if: steps.check.outputs.exists == '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISABLE_AUTOUPDATER: "1" # CI では自動アップデータを無効化（旧 --no-update-sonnet の意図を env で代替）
        run: |
          # front matter（1-4行）を除いた journal-today.md の内容をプロンプトとして使用
          PROMPT=$(tail -n +5 .claude/commands/journal-today.md)
          # --print は非対話モード。CI には承認者がいないため
          # --dangerously-skip-permissions で Write/Edit/Bash/WebSearch を自律実行可能にする。
          # （旧コードの --no-update-sonnet は claude CLI に存在しない不正フラグで
          #  生成ステップが毎回 exit 1 になり、GitHub Actions 経由のジャーナル生成は一度も成功していなかった）
          claude --print "$PROMPT" --dangerously-skip-permissions
        continue-on-error: false

      - name: 生成結果の検証（サイレントスキップ検知）
        # 生成を試みた（exists==0）のに published.json に本日分が登録されていなければ
        # 「ジョブは緑だが記事は出来ていない」状態。明示的に失敗させて気付けるようにする。
        if: steps.check.outputs.exists == '0'
        run: |
          TODAY_JST="${{ steps.check.outputs.today_jst }}"
          OK=$(node -e "
            const p = require('./data/journal_published.json');
            const hit = (p.entries || []).some(e => e.date === '${TODAY_JST}');
            process.stdout.write(hit ? '1' : '0');
          ")
          if [ "$OK" != "1" ]; then
            echo "::error::ジャーナル生成を試みましたが $TODAY_JST が journal_published.json に登録されていません（生成失敗 or サイレントスキップ）。"
            exit 1
          fi
          echo "✅ $TODAY_JST のジャーナルが published.json に登録されています。"

      - name: 季節特集の自動ローテーション（期間切れの seasonal 特集を外す）
        # ジャーナル生成の有無に関わらず毎日実行する。
        # data/featured.json を見て今日の JST 日付で特集ストリップを再生成する。
        run: node scripts/build_featured.js

      - name: 生成ファイルをコミット & プッシュ
        if: always()
        run: |
          git config user.name  "NAGOYA BITES Daily"
          git config user.email "daily@nagoya-bites"
          # ジャーナル記事・SNS原稿・ペンディング店舗・バックログ・特集ローテーション対象
          git add journal/ docs/daily-posts/ 2>/dev/null || true
          git add data/pending_stores.json agent-backlog.md 2>/dev/null || true
          git add index.html features/index.html 2>/dev/null || true
          # 変更がない場合はスキップ
          if git diff --staged --quiet; then
            echo "コミット対象の変更がありません。"
            exit 0
          fi
          # ジャーナル新規生成あり/なしでメッセージを切替
          if [ "${{ steps.check.outputs.exists }}" = "0" ]; then
            git commit -m "[agent] 日次ジャーナル自動生成: ${{ steps.check.outputs.today_jst }}"
          else
            git commit -m "[agent] 特集ローテーション更新: ${{ steps.check.outputs.today_jst }}"
          fi
          # 競合回避のため rebase してからプッシュ
          git pull --rebase origin main || true
          git push || (sleep 10 && git pull --rebase origin main && git push)

      - name: 実行ログ
        if: always()
        run: |
          echo "$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST') — 日次ジャーナルパイプライン完了" >> agent-run.log
          git config user.name  "NAGOYA BITES Daily" 2>/dev/null || true
          git config user.email "daily@nagoya-bites" 2>/dev/null || true
          git add agent-run.log 2>/dev/null || true
          git diff --staged --quiet || git commit -m "[agent] 日次ログ更新 [skip ci]"
          git push || true
