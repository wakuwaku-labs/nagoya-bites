name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    # 毎日午前3時(JST)に自動実行してスプレッドシートの最新データを反映
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps (for GA4 SDK)
        run: npm install --no-audit --no-fund --silent

      - name: Fetch GA4 global view counts → data/view_counts.json
        run: node scripts/fetch_ga4_views.js
        env:
          GA4_SERVICE_ACCOUNT_KEY: ${{ secrets.GA4_SERVICE_ACCOUNT_KEY }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
        continue-on-error: true

      - name: Build (embed store data & update sitemap)
        run: node build.js
        env:
          HOTPEPPER_API_KEY: ${{ secrets.HOTPEPPER_API_KEY }}

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html sitemap.xml data/view_counts.json
          git diff --cached --quiet || git commit -m "chore: auto-update store data [skip actions]"
          git pull --rebase origin main || true
          git push || (sleep 5 && git pull --rebase origin main && git push)
